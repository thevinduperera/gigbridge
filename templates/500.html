{% extends "base.html" %}

{% block title %}500 — Server Error | GigBridge{% endblock %}

{% block content %}
<div class="container py-5 text-center"
     style="min-height: 60vh; display:flex; align-items:center; justify-content:center;">
    <div>
        <div class="gb-error-code">500</div>
        <h2 class="fw-bold mb-3">Something Went Wrong</h2>
        <p class="lead mb-4" style="color: var(--slate-500);">
            We're having trouble on our end. Please try again in a moment.
        </p>
        <a href="{% url 'core:home' %}" class="btn btn-primary px-4">
            <i class="bi bi-house me-2"></i>Back to Home
        </a>
    </div>
</div>
{% endblock %}
