{% extends "base.html" %}

{% block title %}404 — Page Not Found | GigBridge{% endblock %}

{% block content %}
<div class="container py-5 text-center"
     style="min-height: 60vh; display:flex; align-items:center; justify-content:center;">
    <div>
        <div class="gb-error-code">404</div>
        <h2 class="fw-bold mb-3">Page Not Found</h2>
        <p class="lead mb-4" style="color: var(--slate-500);">
            The page you're looking for doesn't exist or has been moved.
        </p>
        <div class="d-flex justify-content-center gap-3 flex-wrap">
            <a href="{% url 'core:home' %}" class="btn btn-primary px-4">
                <i class="bi bi-house me-2"></i>Back to Home
            </a>
            <a href="{% url 'tasks:task_list' %}" class="btn btn-outline-secondary px-4">
                Browse Tasks
            </a>
        </div>
    </div>
</div>
{% endblock %}
