{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card border-0 shadow-sm">
        <div class="card-body p-4">
          <h3 class="mb-1" style="color: var(--slate-900);">Submit a Proposal</h3>
          <p class="text-muted mb-4">Task: <strong>{{ task.title }}</strong></p>
          <form method="post">
            {% csrf_token %}
            <div class="mb-3">
              <label class="form-label fw-500">Cover Letter</label>
              {{ form.cover_letter }}
            </div>
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label fw-500">Your Price ($)</label>
                {{ form.price }}
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label fw-500">Estimated Days</label>
                {{ form.estimated_days }}
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2">
              Submit Proposal
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
