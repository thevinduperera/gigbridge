{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <h2 class="mb-4">Apply for: {{ task.title }}</h2>
  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Cover Letter</label>
      {{ form.cover_letter }}
    </div>
    <div class="mb-3">
      <label class="form-label">Your Price ($)</label>
      {{ form.price }}
    </div>
    <div class="mb-3">
      <label class="form-label">Estimated Days</label>
      {{ form.estimated_days }}
    </div>
    <button type="submit" class="btn btn-primary">Submit Proposal</button>
  </form>
</div>
{% endblock %}
